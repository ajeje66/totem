<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mulino del principe</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    color:#333;
}

.languages{
    display:flex;
    gap:10px;
	flex-direction:column;
	align-items:center;
}

.languages img{
    width:40px;
    cursor:pointer;
    border-radius:4px;
    transition:0.3s;
}

.languages img:hover{
    transform:scale(1.1);
}

.hero{
    padding:140px 20px;
    text-align:center;
    background:white;
}

.hero h1{
    color:#1f3a5f;
    margin-bottom:20px;
    font-size:3rem;
}

.hero p{
    max-width:800px;
    margin:auto;
    line-height:1.8;
    font-size:1.1rem;
}

.section{
    padding:60px 40px;
}

.section h2{
    text-align:center;
    color:#1f3a5f;
    margin-bottom:40px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.card h3{
    color:#1f3a5f;
    margin-bottom:10px;
}

footer{
    background:#1f3a5f;
    color:white;
    text-align:center;
    padding:20px;
}
#closeBtn{
	position:static;
	z-index: auto;
	padding: 10px 15px;
	color: white;
	padding: 0.7em 1.7em;
	font-size: 18px;
	border-radius: 0.5em;
	background: #5293eb;
	cursor: pointer;
	border: 1px solid #e8e8e8;
	transition: all 0.3s;
}

#closeBtn:active {
  color: #666;
  box-shadow: inset 4px 4px 12px #c5c5c5, inset -4px -4px 12px #ffffff;
}

#menuBar{
    display:flex;
    width:100%;

    background:#1f3a5f;

    border-bottom:2px solid rgba(255,255,255,.15);
}

#menuBar button{
	margin-top:140px;
    flex:1;

    border:none;
    background:none;

    color:white;
    cursor:pointer;

    transition:.3s;
	
	min-height:80px;

    font-size:24px;

    padding:20px;

}

#menuBar button.active{
    background:#5293eb;
    font-weight:bold;
}
@media (hover: hover) {

    #menuBar button:hover{
        background: rgba(255,255,255,.1);
    }

}
</style>
</head>
<link rel="stylesheet" href="css.css">
<body>


<div id="totemHeader">
	<button id="closeBtn">Chiudi</button>
	<div class="logo">
        <span>Mulino del principe </span>
		<img class="logo-img" src="qr.png">
    </div>
	
	<div class="languages">
	
        <img src="img/it.svg"
             alt="Italiano"
             onclick="changeLanguage('it')">

        <img src="img/uk.svg"
             alt="English"
             onclick="changeLanguage('en')">

        <img src="img/de.svg"
             alt="Deutsch"
             onclick="changeLanguage('de')">
    </div>
    
</div>
<nav id="menuBar">

    <button id="btnHome"
            onclick="loadPage('home.html', this)">
        Home
    </button>

    <button onclick="loadPage('libro1.html', this)">
        flipbook
	</button>



</nav>

<div id="contentArea">

    <iframe
        id="subFrame"
		src="home.html"
        style="
            width:100%;
            height:calc(100vh - 10px);
            border:none;
        ">
    </iframe>

</div>

<footer>

    <span data-i18n="footerText">
        © Mulino del principe
    </span>

</footer>

<script>

function loadPage(url, btn){

    document.getElementById('subFrame').src = url;

    document
        .querySelectorAll('#menuBar button')
        .forEach(b => b.classList.remove('active'));

    if(btn){
		btn.classList.add('active');
		}

    signalActivity();
}

document.getElementById('closeBtn').addEventListener('click', () => {
	parent.postMessage('closeIframe', '*');
	});
	
function signalActivity() {
    parent.postMessage('activity', '*');
}

document.addEventListener('click', signalActivity);
document.addEventListener('touchstart', signalActivity);
document.addEventListener('mousemove', signalActivity);
document.addEventListener('scroll', signalActivity);

window.addEventListener("DOMContentLoaded", () => {

    const savedLanguage =
        localStorage.getItem("language") || "it";

    changeLanguage(savedLanguage);

});

window.addEventListener('DOMContentLoaded', () => {

    const homeBtn =
        document.getElementById('btnHome');

    loadPage('home.html', homeBtn);

});

window.addEventListener("message", function(event){

    if(event.data.type === "activity"){

        parent.postMessage(
            {
                type:"activity"
            },
            "*"
        );

    }

});
</script>
