<!DOCTYPE html>
<html lang="it">

<head>

	<meta charset="UTF-8">
	
	<meta
	name="viewport"
	content="width=device-width, initial-scale=1.0">
	
	<title data-lang="page_title">
		Mulino del Principe
	</title>
	
	<link rel="stylesheet" href="css/style.css">
	
	<link
	href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
	rel="stylesheet">

</head>

<body>

	<!-- ======================
	MENU LINGUE
	====================== -->
	
	<header>
	
		<div class="language-selector">
		
			<button data-language="it"><img src="img/it.svg" alt="🇮🇹"></button>
			
			<button data-language="en"><img src="img/uk.svg" alt="🇬🇧"></button>
			
			<button data-language="fr">🇫🇷</button>
			
			<button data-language="de">🇩🇪</button>
			
			<button data-language="es">🇪🇸</button>
		
		</div>
	
	</header>
	
	<!-- ======================
	HERO
	====================== -->
	
	<section class="hero">
	
		<img
		src="img/hero.jpg"
		class="hero-image">
		
		<div class="hero-overlay">
		
			<h1 data-lang="hero_title">
				Titolo
			</h1>
			
			<p data-lang="hero_subtitle">
			
				Sottotitolo
			
			</p>
		
		</div>
	
	</section>
	
	<!-- ======================
	INTRO
	====================== -->
	
	<section class="container">
	
		<h2 data-lang="history">
		
			Storia
		
		</h2>
		
		<p data-lang="history_text">
			
			Lorem ipsum
		
		</p>
	
	</section>
	
	<!-- ======================
	GALLERIA
	====================== -->
	
	<section class="container">
	
		<h2 data-lang="gallery">
		
			Galleria
		
		</h2>
		
		<div class="gallery">
		
			<img src="img/gallery1.jpg">
			
			<img src="img/gallery2.jpg">
			
			<img src="img/gallery3.jpg">
			
			<img src="img/gallery4.jpg">
		
		</div>
	
	</section>
	
	<!-- ======================
	CURIOSITA'
	====================== -->
	
	<section class="container">
	
		<div class="card">
		
			<h2 data-lang="curiosity">
			
				Curiosità
			
			</h2>
			
			<p data-lang="curiosity_text">
			
				Lorem ipsum
			
			</p>
		
		</div>
	
	</section>
	
	<script src="js/script.js"></script>

</body>

</html>
